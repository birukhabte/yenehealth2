<svg width="360" height="740" viewBox="0 0 360 740" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="360" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a2a2e"/>
      <stop offset="0.5" stop-color="#111114"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="coralCard" x1="24" y1="140" x2="336" y2="352" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8857c"/>
      <stop offset="1" stop-color="#ef6f66"/>
    </linearGradient>
    <linearGradient id="tealBanner" x1="24" y1="372" x2="336" y2="446" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34a99e"/>
      <stop offset="1" stop-color="#1f8b81"/>
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8b4ad"/>
      <stop offset="1" stop-color="#e98b82"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#b23b34" flood-opacity="0.30"/>
    </filter>
    <clipPath id="screenClip"><rect x="12" y="12" width="336" height="716" rx="44"/></clipPath>
  </defs>

  <!-- Phone frame -->
  <g filter="url(#softShadow)">
    <rect x="0" y="0" width="360" height="740" rx="56" fill="url(#frameGrad)"/>
    <rect x="6" y="6" width="348" height="728" rx="50" fill="#000000"/>
    <rect x="12" y="12" width="336" height="716" rx="44" fill="#ffffff"/>
  </g>

  <g clip-path="url(#screenClip)">
    <!-- Status bar -->
    <text x="36" y="46" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d1d1f">11:20</text>
    <g fill="#1d1d1f">
      <rect x="288" y="36" width="3" height="9" rx="1"/>
      <rect x="293" y="33" width="3" height="12" rx="1"/>
      <rect x="298" y="30" width="3" height="15" rx="1"/>
      <rect x="303" y="27" width="3" height="18" rx="1"/>
      <path d="M312 33c4-4 11-4 15 0l-7.5 8z"/>
      <rect x="330" y="30" width="18" height="11" rx="3" fill="none" stroke="#1d1d1f" stroke-width="1.4"/>
      <rect x="332" y="32.5" width="12" height="6" rx="1.5"/>
    </g>
    <!-- Dynamic island -->
    <rect x="140" y="24" width="80" height="22" rx="11" fill="#000000"/>

    <!-- Profile header -->
    <circle cx="46" cy="98" r="19" fill="url(#avatarGrad)"/>
    <circle cx="46" cy="92" r="6.5" fill="#fff" opacity="0.95"/>
    <path d="M35 108c1.5-7 20-7 22 0z" fill="#fff" opacity="0.95"/>
    <text x="76" y="92" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1" fill="#9aa0a6">WELCOME</text>
    <text x="76" y="110" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#1d2330">Yodit A. <tspan font-size="11" font-weight="600" fill="#9aa0a6">(5649874)</tspan></text>
    <!-- Bell -->
    <g transform="translate(318,86)" fill="none" stroke="#3b4250" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 9a6 6 0 0112 0c0 5 2 6 2 6H0s2-1 2-6z"/>
      <path d="M6 18a2.4 2.4 0 004 0"/>
    </g>

    <!-- Our Services card -->
