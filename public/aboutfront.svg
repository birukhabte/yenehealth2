    <g transform="translate(282,210)">
      <circle cx="0" cy="0" r="23" fill="#ffffff"/>
      <path d="M0 -9c5 6 7 9 7 12a7 7 0 01-14 0c0-3 2-6 7-12z" fill="#ef6f66"/>
      <text x="0" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Menstruation</text>
      <text x="0" y="50" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Tracker</text>
