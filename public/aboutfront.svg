    <text x="44" y="174" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Our Services</text>

    <!-- Service icons: 3 columns x 2 rows -->
    <g transform="translate(78,210)">
      <circle cx="0" cy="0" r="23" fill="#ffffff"/>
      <g stroke="#ef6f66" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M-7 -8v6a4 4 0 008 0v-6"/>
        <path d="M1 2v4a5 5 0 005 5 4 4 0 004-4v-3"/>
