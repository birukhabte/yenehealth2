    <text x="42" y="400" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Need Medication?</text>
    <text x="42" y="416" font-family="Inter, Arial, sans-serif" font-size="8.5" fill="#ffffff" opacity="0.85">Buy the necessary items for your</text>
    <text x="42" y="427" font-family="Inter, Arial, sans-serif" font-size="8.5" fill="#ffffff" opacity="0.85">menstruation from our pharmacy</text>
    <rect x="42" y="430" width="74" height="20" rx="10" fill="#ffffff"/>
    <text x="79" y="444" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9" font-weight="700" fill="#1f8b81">Buy Items Now</text>

