    <g transform="translate(78,300)">
      <circle cx="0" cy="0" r="23" fill="#ffffff"/>
      <g stroke="#ef6f66" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round">
        <rect x="-7" y="-9" width="14" height="18" rx="2.5"/>
        <path d="M-3 -3h6M-3 1h6M-3 5h3"/>
      </g>
      <text x="0" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">My Health</text>
      <text x="0" y="50" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Records</text>
    </g>
    <g transform="translate(180,300)">
      <circle cx="0" cy="0" r="23" fill="#ffffff"/>
      <g transform="rotate(45)">
        <rect x="-9" y="-5" width="18" height="10" rx="5" fill="none" stroke="#ef6f66" stroke-width="2"/>
        <path d="M0 -5v10" stroke="#ef6f66" stroke-width="2"/>
      </g>
      <text x="0" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Medication</text>
      <text x="0" y="50" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Tracker</text>
    </g>
    <g transform="translate(282,300)">
      <circle cx="0" cy="0" r="23" fill="#ffffff"/>
      <g stroke="#ef6f66" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round">
        <path d="M-8 -8h7a2 2 0 012 2v14a2 2 0 00-2-2h-7z"/>
        <path d="M8 -8h-7a2 2 0 00-2 2v14a2 2 0 012-2h7z"/>
      </g>
      <text x="0" y="40" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Health</text>
      <text x="0" y="50" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Knowledge</text>
