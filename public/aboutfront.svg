    <text x="332" y="486" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#ef6f66">See All</text>

    <rect x="24" y="500" width="312" height="90" rx="18" fill="#ffffff" stroke="#f0f1f4" stroke-width="1.5"/>
    <circle cx="58" cy="534" r="18" fill="url(#avatarGrad)"/>
    <circle cx="58" cy="528" r="6" fill="#fff"/>
    <path d="M47 543c1.5-6 20-6 22 0z" fill="#fff"/>
    <text x="88" y="528" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2330">Dr. Feven Daniel</text>
    <text x="88" y="544" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#9aa0a6">Gynaecology · 12 Yrs.</text>
    <rect x="88" y="552" width="62" height="18" rx="9" fill="#e8f6f4"/>
    <text x="119" y="565" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="8.5" font-weight="700" fill="#1f8b81">Confirmed</text>
    <g transform="translate(300,524)" fill="none" stroke="#ef6f66" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="2" width="20" height="18" rx="3"/>
      <path d="M0 8h20M5 -1v5M15 -1v5"/>
    </g>

    <!-- Bottom nav -->
    <rect x="24" y="612" width="312" height="62" rx="20" fill="#fbfbfc" stroke="#f0f1f4" stroke-width="1.5"/>
    <circle cx="70" cy="643" r="16" fill="#ef6f66"/>
    <path d="M64 643l4 4 8-8" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="150" cy="643" r="3.5" fill="#c7cad0"/>
    <circle cx="210" cy="643" r="3.5" fill="#c7cad0"/>
    <circle cx="290" cy="643" r="3.5" fill="#c7cad0"/>
    <!-- Home indicator -->
    <rect x="138" y="704" width="84" height="5" rx="2.5" fill="#1d1d1f"/>
