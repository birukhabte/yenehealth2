<svg width="380" height="784" viewBox="0 0 380 784" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bFrame" x1="0" y1="0" x2="380" y2="784" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#33333a"/>
      <stop offset="1" stop-color="#0c0c0f"/>
    </linearGradient>
    <linearGradient id="bScreen" x1="0" y1="12" x2="380" y2="772" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdeceb"/>
      <stop offset="1" stop-color="#fbdedd"/>
    </linearGradient>
    <linearGradient id="bAvatar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6b8b1"/>
      <stop offset="1" stop-color="#ec9189"/>
    </linearGradient>
    <filter id="bShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="34" flood-color="#9c3730" flood-opacity="0.32"/>
    </filter>
    <filter id="glassBlur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <clipPath id="bScreenClip"><rect x="13" y="13" width="354" height="758" rx="46"/></clipPath>
  </defs>

  <!-- Phone frame (slightly transparent for depth) -->
  <g filter="url(#bShadow)" opacity="0.96">
    <rect x="0" y="0" width="380" height="784" rx="58" fill="url(#bFrame)"/>
    <rect x="6" y="6" width="368" height="772" rx="52" fill="#050507"/>
    <rect x="13" y="13" width="354" height="758" rx="46" fill="url(#bScreen)"/>
  </g>

  <!-- UI (blurred + reduced opacity to sit behind) -->
  <g clip-path="url(#bScreenClip)" filter="url(#glassBlur)" opacity="0.92">
    <!-- Status bar -->
    <text x="38" y="48" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#3a3033">9:41</text>
    <g fill="#3a3033">
      <rect x="306" y="38" width="3" height="9" rx="1"/>
      <rect x="311" y="35" width="3" height="12" rx="1"/>
      <rect x="316" y="32" width="3" height="15" rx="1"/>
      <rect x="321" y="29" width="3" height="18" rx="1"/>
      <rect x="346" y="32" width="18" height="11" rx="3" fill="none" stroke="#3a3033" stroke-width="1.4"/>
      <rect x="348" y="34.5" width="12" height="6" rx="1.5"/>
    </g>
    <rect x="150" y="26" width="80" height="22" rx="11" fill="#1a1416"/>

    <!-- Doctor header -->
    <circle cx="48" cy="100" r="20" fill="url(#bAvatar)"/>
    <circle cx="48" cy="94" r="7" fill="#fff" opacity="0.95"/>
    <path d="M36 112c1.6-7.5 22-7.5 24 0z" fill="#fff" opacity="0.95"/>
    <text x="80" y="95" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1" fill="#b98f8c">GOOD MORNING</text>
    <text x="80" y="114" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#52383a">Dr. Feven</text>
    <g transform="translate(330,90)" fill="none" stroke="#7a5c5d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 9a6 6 0 0112 0c0 5 2 6 2 6H0s2-1 2-6z"/>
      <path d="M6 18a2.4 2.4 0 004 0"/>
    </g>

    <!-- On-Demand Visits toggle row -->
    <rect x="26" y="142" width="328" height="56" rx="18" fill="#ffffff" opacity="0.85"/>
    <g transform="translate(46,162)" fill="none" stroke="#ec7a72" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="6" cy="6" r="9"/>
      <path d="M6 1v5l3 2"/>
    </g>
    <text x="72" y="166" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#52383a">On-Demand Visits</text>
    <text x="72" y="182" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#a98583">Accept instant consultations</text>
    <rect x="304" y="160" width="34" height="20" rx="10" fill="#34a99e"/>
    <circle cx="328" cy="170" r="7.5" fill="#ffffff"/>

    <!-- Search bar -->
    <rect x="26" y="214" width="328" height="40" rx="20" fill="#ffffff" opacity="0.8"/>
    <circle cx="50" cy="234" r="6" fill="none" stroke="#c79a98" stroke-width="2"/>
    <path d="M55 239l4 4" stroke="#c79a98" stroke-width="2" stroke-linecap="round"/>
    <text x="68" y="238" font-family="Inter, Arial, sans-serif" font-size="11" fill="#bb938f">Search patients, appointments...</text>

    <!-- Appointments Today -->
    <text x="28" y="288" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#52383a">Appointments Today</text>
    <text x="352" y="288" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#ec7a72">See All</text>

    <!-- Appointment cards -->
    <g>
      <rect x="26" y="302" width="328" height="76" rx="18" fill="#ffffff" opacity="0.9"/>
      <circle cx="58" cy="340" r="18" fill="url(#bAvatar)"/>
      <text x="86" y="332" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#52383a">Yodit A.</text>
      <text x="86" y="348" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#a98583">Antenatal Visit · 10:30 AM</text>
      <rect x="262" y="328" width="78" height="24" rx="12" fill="#ec7a72"/>
      <text x="301" y="344" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9.5" font-weight="700" fill="#ffffff">Start Consult</text>
    </g>
    <g>
      <rect x="26" y="390" width="328" height="76" rx="18" fill="#ffffff" opacity="0.78"/>
      <circle cx="58" cy="428" r="18" fill="#e7b7c6"/>
      <text x="86" y="420" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#52383a">Marta K.</text>
      <text x="86" y="436" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#a98583">Follow-up · 11:15 AM</text>
      <rect x="262" y="416" width="78" height="24" rx="12" fill="none" stroke="#ec7a72" stroke-width="1.6"/>
      <text x="301" y="432" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="9.5" font-weight="700" fill="#ec7a72">Upcoming</text>
    </g>

    <!-- Stats row -->
    <rect x="26" y="480" width="158" height="80" rx="18" fill="#34a99e" opacity="0.92"/>
    <text x="46" y="514" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">12</text>
    <text x="46" y="534" font-family="Inter, Arial, sans-serif" font-size="10" fill="#ffffff" opacity="0.9">Consults Today</text>
    <rect x="196" y="480" width="158" height="80" rx="18" fill="#ffffff" opacity="0.9"/>
    <text x="216" y="514" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ec7a72">98%</text>
    <text x="216" y="534" font-family="Inter, Arial, sans-serif" font-size="10" fill="#a98583">Satisfaction</text>

    <!-- Availability card -->
    <rect x="26" y="574" width="328" height="86" rx="18" fill="#ffffff" opacity="0.85"/>
    <text x="46" y="604" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#52383a">Set Availability</text>
    <text x="46" y="622" font-family="Inter, Arial, sans-serif" font-size="9.5" fill="#a98583">Manage your weekly schedule</text>
    <rect x="46" y="632" width="40" height="14" rx="7" fill="#fbe0de"/>
    <rect x="92" y="632" width="40" height="14" rx="7" fill="#fbe0de"/>
    <rect x="138" y="632" width="40" height="14" rx="7" fill="#e8f6f4"/>

    <!-- Bottom nav -->
    <rect x="26" y="678" width="328" height="64" rx="22" fill="#ffffff" opacity="0.92"/>
    <circle cx="74" cy="710" r="16" fill="#ec7a72"/>
    <rect x="68" y="704" width="12" height="12" rx="3" fill="#fff"/>
    <circle cx="158" cy="710" r="3.5" fill="#d9b3b1"/>
    <circle cx="222" cy="710" r="3.5" fill="#d9b3b1"/>
    <circle cx="306" cy="710" r="3.5" fill="#d9b3b1"/>
    <rect x="148" y="752" width="84" height="5" rx="2.5" fill="#52383a"/>
  </g>

  <!-- Glass glow highlight -->
  <rect x="13" y="13" width="354" height="758" rx="46" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="1.5"/>
</svg>
